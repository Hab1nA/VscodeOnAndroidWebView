<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termux Code-Server 管理台</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --green: #3fb950;
            --red: #f85149;
            --blue: #58a6ff;
            --orange: #d2991d;
            --btn-green: #238636;
            --btn-green-hover: #2ea043;
            --btn-red: #da3633;
            --btn-red-hover: #f85149;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* ---- 头部 ---- */
        .header {
            text-align: center;
            margin-bottom: 32px;
            width: 100%;
            max-width: 420px;
        }
        .header .icon {
            font-size: 48px;
            margin-bottom: 8px;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .header .subtitle {
            font-size: 13px;
            color: var(--text-dim);
        }

        /* ---- 卡片容器 ---- */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            padding: 24px;
            margin-bottom: 16px;
        }

        /* ---- 状态指示器 ---- */
        .status-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 8px currentColor;
        }
        .status-dot.running {
            background: var(--green);
            color: var(--green);
            animation: pulse 2s infinite;
        }
        .status-dot.stopped {
            background: var(--red);
            color: var(--red);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .status-text {
            font-size: 18px;
            font-weight: 600;
        }
        .status-text.running { color: var(--green); }
        .status-text.stopped { color: var(--red); }
        .status-pid {
            font-size: 12px;
            color: var(--text-dim);
            margin-left: auto;
        }

        /* ---- 按钮 ---- */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .btn {
            flex: 1;
            padding: 14px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            letter-spacing: 0.3px;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .btn-start {
            background: var(--btn-green);
            color: #ffffff;
        }
        .btn-start:hover:not(:disabled) {
            background: var(--btn-green-hover);
        }
        .btn-stop {
            background: var(--btn-red);
            color: #ffffff;
        }
        .btn-stop:hover:not(:disabled) {
            background: var(--btn-red-hover);
        }

        /* ---- 信息区域 ---- */
        .info-list {
            list-style: none;
            font-size: 13px;
        }
        .info-list li {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            word-break: break-all;
        }
        .info-list li:last-child {
            border-bottom: none;
        }
        .info-label {
            color: var(--text-dim);
            white-space: nowrap;
            min-width: 70px;
        }
        .info-value {
            color: var(--blue);
        }
        .info-value a {
            color: var(--blue);
            text-decoration: none;
        }
        .info-value a:active {
            color: #79c0ff;
        }

        /* ---- 消息提示 ---- */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 24px;
            font-size: 14px;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateX(-50%) translateY(20px);
        }
        .toast.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }
        .toast.success { border-color: var(--green); color: var(--green); }
        .toast.error { border-color: var(--red); color: var(--red); }

        /* ---- 响应式微调 ---- */
        @media (max-width: 360px) {
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <!-- 头部 -->
    <div class="header">
        <div class="icon">🖥️</div>
        <h1>Code-Server 控制台</h1>
        <p class="subtitle">Termux · VS Code Server Manager</p>
    </div>

    <!-- 主控制卡片 -->
    <div class="card">
        <!-- 状态行 -->
        <div class="status-section">
            <div class="status-dot stopped" id="statusDot"></div>
            <span class="status-text stopped" id="statusText">已停止</span>
            <span class="status-pid" id="statusPid"></span>
        </div>

        <!-- 按钮 -->
        <div class="btn-group">
            <button class="btn btn-start" id="btnStart" onclick="startCodeServer()">
                ▶ 启动 VS Code
            </button>
            <button class="btn btn-stop" id="btnStop" onclick="stopCodeServer()">
                ■ 停止 VS Code
            </button>
        </div>

        <!-- 连接信息 -->
        <ul class="info-list">
            <li>
                <span class="info-label">📡 VS Code</span>
                <span class="info-value" id="infoCodeUrl">—</span>
            </li>
            <li>
                <span class="info-label">⚙️ 管理台</span>
                <span class="info-value" id="infoUiUrl">—</span>
            </li>
        </ul>
    </div>

    <!-- Toast 消息 -->
    <div class="toast" id="toast"></div>

    <script>
        // ---- DOM 引用 ----
        const $dot = document.getElementById('statusDot');
        const $statusText = document.getElementById('statusText');
        const $statusPid = document.getElementById('statusPid');
        const $btnStart = document.getElementById('btnStart');
        const $btnStop = document.getElementById('btnStop');
        const $infoCodeUrl = document.getElementById('infoCodeUrl');
        const $infoUiUrl = document.getElementById('infoUiUrl');
        const $toast = document.getElementById('toast');

        let toastTimer = null;
        let pollTimer = null;

        // ---- Toast 消息 ----
        function showToast(msg, type) {
            if (toastTimer) clearTimeout(toastTimer);
            $toast.textContent = msg;
            $toast.className = 'toast ' + type + ' show';
            toastTimer = setTimeout(() => {
                $toast.classList.remove('show');
            }, 3000);
        }

        // ---- 更新 UI 状态 ----
        function updateUI(data) {
            const running = data.running;
            const pid = data.pid;

            // 状态点 & 文字
            $dot.className = 'status-dot ' + (running ? 'running' : 'stopped');
            $statusText.className = 'status-text ' + (running ? 'running' : 'stopped');
            $statusText.textContent = running ? '运行中' : '已停止';

            // PID 显示
            $statusPid.textContent = pid ? 'PID: ' + pid : '';

            // 按钮状态
            $btnStart.disabled = running;
            $btnStop.disabled = !running;

            // URL 信息
            $infoCodeUrl.innerHTML = running
                ? '<a href="' + data.code_server_url + '" target="_blank">' + data.code_server_url + '</a>'
                : '—';
            $infoUiUrl.textContent = data.web_ui_url || location.host;
        }

        // ---- 轮询状态 ----
        function pollStatus() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => updateUI(data))
                .catch(() => {
                    showToast('无法连接到管理后端服务', 'error');
                });
        }

        // ---- 启动 ----
        function startCodeServer() {
            $btnStart.disabled = true;
            showToast('正在启动 code-server...', 'success');

            fetch('/api/start', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        showToast(data.message, 'success');
                    } else {
                        showToast(data.message, 'error');
                    }
                    pollStatus();
                })
                .catch(err => {
                    showToast('请求失败: ' + (err.message || String(err)), 'error');
                    pollStatus();
                });
        }

        // ---- 停止 ----
        function stopCodeServer() {
            $btnStop.disabled = true;
            showToast('正在停止 code-server...', 'error');

            fetch('/api/stop', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        showToast(data.message, 'success');
                    } else {
                        showToast(data.message, 'error');
                    }
                    pollStatus();
                })
                .catch(err => {
                    showToast('请求失败: ' + (err.message || String(err)), 'error');
                    pollStatus();
                });
        }

        // ---- 初始化 ----
        function init() {
            pollStatus();
            pollTimer = setInterval(pollStatus, 5000); // 每5秒刷新状态
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
